# -------------------------------------------------------------
# DAGANGPLAY NGINX DYNAMIC TEMPLATE
# -------------------------------------------------------------
# File ini menjadi blue-print. Backend Node.js akan menyalin file ini,
# mengganti placeholder {{DOMAIN}}, dan menyimpan ke /etc/nginx/sites-available/
# lalu melakukan symlink ke sites-enabled dan me-reload NGINX.

server {
    listen 80;
    server_name {{DOMAIN}};

    # Lokasi untuk pembuktian Certbot (Webroot)
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }

    # Force HTTPS Redirect
    # (Bisa di-toggle berdasarkan konfigurasi forceHttps di database)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name {{DOMAIN}};

    # SSL Certificates (Path otomatis yang di-generate Certbot)
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Reverse Proxy menuju ke Frontend Next.js DagangPlay
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        
        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
    }
}
